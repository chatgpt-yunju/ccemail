name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.8", "3.12", "3.14"]
        exclude:
          # Python 3.14 not yet in setup-python for all OS
          - os: ubuntu-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Verify syntax
        run: python -c "import py_compile; py_compile.compile('claude_lark_notify.py', doraise=True)"

      - name: Verify shell scripts
        if: runner.os != 'Windows'
        run: |
          bash -n install.sh
          bash -n uninstall.sh
